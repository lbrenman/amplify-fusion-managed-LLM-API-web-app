<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aria — AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0c0c0e;
      --surface:    #131316;
      --surface-2:  #1c1c21;
      --border:     #2a2a32;
      --border-2:   #38383f;
      --text:       #e8e8ec;
      --text-dim:   #7a7a8a;
      --text-muted: #4a4a58;
      --accent:     #c8a96e;
      --accent-2:   #9b6fa8;
      --radius:     14px;
      --mono:       'DM Mono', monospace;
      --serif:      'Fraunces', serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,169,110,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,169,110,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(12,12,14,.9);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500; color: #0c0c0e;
    }
    .logo-name {
      font-family: var(--serif); font-size: 19px; font-weight: 600;
      letter-spacing: .01em; color: var(--text);
    }
    .logo-name span { color: var(--accent); }

    .header-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted);
      font-weight: 300; letter-spacing: .06em; text-transform: uppercase;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4ade80; animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .btn-clear {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); font-family: var(--mono); font-size: 11px;
      letter-spacing: .05em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    .btn-clear:hover { border-color: var(--border-2); color: var(--text); background: var(--surface-2); }

    /* ── Messages ── */
    #messages {
      position: relative; z-index: 1;
      flex: 1; overflow-y: auto;
      padding: 40px 0 20px; scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message-row {
      display: flex; padding: 6px 28px; gap: 14px;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; margin-top: 2px;
    }
    .avatar.ai {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0c0c0e; font-family: var(--serif); font-style: italic; font-size: 13px;
    }
    .avatar.user { background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-dim); }

    .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: min(680px, 80%); }
    .message-row.user .bubble-wrap { align-items: flex-end; }

    .role-label {
      font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted); padding: 0 4px; font-weight: 500;
    }

    .bubble {
      padding: 14px 18px; border-radius: var(--radius);
      line-height: 1.75; font-size: 14px; font-weight: 300; word-break: break-word; white-space: pre-wrap;
    }
    .bubble.ai {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
    }
    .bubble.user {
      background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text);
      border-radius: var(--radius) 4px var(--radius) var(--radius);
    }

    .cursor {
      display: inline-block; width: 2px; height: 14px;
      background: var(--accent); margin-left: 3px;
      vertical-align: text-bottom; animation: blink .8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Empty state ── */
    #empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 16px; text-align: center; padding: 40px;
      animation: fadeUp .5s ease both;
    }
    .empty-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-style: italic; font-size: 26px;
      color: #0c0c0e; margin-bottom: 8px;
    }
    .empty-title { font-family: var(--serif); font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
    .empty-sub { font-size: 13px; color: var(--text-dim); font-weight: 300; max-width: 380px; line-height: 1.8; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; max-width: 500px; }
    .suggestion-pill {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-dim); font-family: var(--mono); font-size: 12px;
      font-weight: 300; padding: 8px 16px; border-radius: 100px; cursor: pointer; transition: all .2s;
    }
    .suggestion-pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,.06); }

    /* ── Input ── */
    #input-area {
      position: relative; z-index: 10;
      padding: 16px 28px 24px;
      background: rgba(12,12,14,.95);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(12px); flex-shrink: 0;
    }
    .input-container {
      display: flex; align-items: flex-end; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 12px 14px 12px 18px; transition: border-color .2s;
    }
    .input-container:focus-within { border-color: var(--border-2); box-shadow: 0 0 0 3px rgba(200,169,110,.06); }

    #prompt-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--mono); font-size: 14px;
      font-weight: 300; line-height: 1.6; resize: none; max-height: 160px; overflow-y: auto;
    }
    #prompt-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 38px; height: 38px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0c0c0e; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
    }
    #send-btn:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
    #send-btn:active:not(:disabled) { transform: scale(.96); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; }

    .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding: 0 4px; }
    .input-hint { font-size: 11px; color: var(--text-muted); letter-spacing: .04em; }
    .char-count { font-size: 11px; color: var(--text-muted); font-weight: 300; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #3d1a1a; border: 1px solid #6b2020; color: #ff9090;
      font-family: var(--mono); font-size: 12px; padding: 10px 20px;
      border-radius: 10px; opacity: 0; transition: all .3s;
      pointer-events: none; z-index: 100; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .message-row { padding: 6px 16px; }
      #input-area { padding: 12px 16px 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">A</div>
    <div class="logo-name">Ari<span>a</span></div>
  </div>
  <div class="header-meta">
    <div class="status-dot"></div>
    <span>Online</span>
  </div>
  <button class="btn-clear" id="clear-btn">Clear chat</button>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">A</div>
    <div class="empty-title">How can I help?</div>
    <p class="empty-sub">Ask me anything. I'll stream a response in real time.</p>
    <div class="suggestions">
      <button class="suggestion-pill" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
      <button class="suggestion-pill" data-prompt="Write a short poem about the ocean at night">Write a poem</button>
      <button class="suggestion-pill" data-prompt="What are the best practices for REST API design?">REST API best practices</button>
      <button class="suggestion-pill" data-prompt="Say hello in 5 different languages">Hello in 5 languages</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-container">
    <textarea id="prompt-input" rows="1" placeholder="Send a message…" autocomplete="off" spellcheck="true"></textarea>
    <button id="send-btn" title="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
      </svg>
    </button>
  </div>
  <div class="input-footer">
    <span class="input-hint">↵ send &nbsp;·&nbsp; ⇧↵ newline</span>
    <span class="char-count" id="char-count">0</span>
  </div>
</div>

<div id="toast"></div>

<script>
  // Calls the local Express proxy — no CORS issues
  const API_URL = '/api/stream';

  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const inputEl    = document.getElementById('prompt-input');
  const sendBtn    = document.getElementById('send-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const charCount  = document.getElementById('char-count');
  const toast      = document.getElementById('toast');

  let isStreaming = false;
  let abortCtrl   = null;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    charCount.textContent = inputEl.value.length;
  });

  // Enter to send, Shift+Enter for newline
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  clearBtn.addEventListener('click', () => {
    if (isStreaming && abortCtrl) abortCtrl.abort();
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
  });

  document.querySelectorAll('.suggestion-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      inputEl.value = btn.dataset.prompt;
      inputEl.dispatchEvent(new Event('input'));
      sendMessage();
    });
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function appendMessage(role, text = '') {
    if (emptyState.parentElement) emptyState.remove();

    const row    = document.createElement('div');
    row.className = `message-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? 'A' : 'U';

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    const label = document.createElement('div');
    label.className = 'role-label';
    label.textContent = role === 'ai' ? 'Aria' : 'You';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    row.appendChild(avatar);
    row.appendChild(wrap);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  async function sendMessage() {
    const prompt = inputEl.value.trim();
    if (!prompt || isStreaming) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    charCount.textContent = '0';

    appendMessage('user', prompt);

    const aiBubble = appendMessage('ai', '');
    const cursor   = document.createElement('span');
    cursor.className = 'cursor';
    aiBubble.appendChild(cursor);

    isStreaming   = true;
    sendBtn.disabled = true;
    abortCtrl     = new AbortController();

    let accumulated = '';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
        signal: abortCtrl.signal,
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        let eventType = null;
        for (const line of lines) {
          if (line.startsWith('event:')) {
            eventType = line.slice(6).trim();
          } else if (line.startsWith('data:')) {
            const data = line.slice(5); // preserve leading space (word separator)
            if (eventType === 'chunk') {
              accumulated += data;
              aiBubble.innerText = accumulated;
              aiBubble.appendChild(cursor);
              scrollToBottom();
            }
            eventType = null;
          }
        }
      }

    } catch (err) {
      if (err.name !== 'AbortError') {
        showToast(`Error: ${err.message}`);
        if (!accumulated) {
          aiBubble.textContent = `Error: ${err.message}`;
          aiBubble.style.color = 'var(--text-dim)';
        }
        console.error('Stream error:', err);
      }
    } finally {
      cursor.remove();
      isStreaming      = false;
      sendBtn.disabled = false;
      abortCtrl        = null;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
